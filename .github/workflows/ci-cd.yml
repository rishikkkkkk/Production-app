name: CI/CD Pipeline

on:
  push:
    branches:
      - main        # triggers prod deploy
      - develop     # triggers dev deploy
    paths:
      - 'app/**'
      - 'helm/devops-app/**'
      - '.github/workflows/ci-cd.yaml'
  pull_request:
    branches:
      - main
    paths:
      - 'app/**'
      - 'helm/devops-app/**'
      - '.github/workflows/ci-cd.yaml'

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/devops-app
  HELM_CHART: ./helm/devops-app

jobs:
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate image tag
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "tag=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "Image tag: ${SHORT_SHA}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-dev:
    name: Deploy to Dev
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Setup Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.14.0'

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_DEV }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Helm upgrade (dev)
        id: helm_deploy
        run: |
          helm upgrade --install devops-app ${{ env.HELM_CHART }} \
            -f ${{ env.HELM_CHART }}/environments/dev/values.yaml \
            --namespace dev \
            --create-namespace \
            --set image.tag=${{ needs.build.outputs.image_tag }} \
            --set env.APP_VERSION=${{ needs.build.outputs.image_tag }} \
            --wait \
            --timeout 5m \
            --atomic

      - name: Notify Slack — Dev success
        if: success()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "✅ *Dev Deploy Succeeded*",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "✅ *Dev Deploy Succeeded*\n*Repo:* ${{ github.repository }}\n*Branch:* `${{ github.ref_name }}`\n*Tag:* `${{ needs.build.outputs.image_tag }}`\n*Triggered by:* ${{ github.actor }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Notify Slack — Dev failure
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "❌ *Dev Deploy Failed*",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "❌ *Dev Deploy Failed*\n*Repo:* ${{ github.repository }}\n*Branch:* `${{ github.ref_name }}`\n*Tag:* `${{ needs.build.outputs.image_tag }}`\n*Actor:* ${{ github.actor }}\n*Run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Logs>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  deploy-prod:
    name: Deploy to Prod
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: prod

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Setup Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.14.0'

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_PROD }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Capture current revision (for rollback)
        id: pre_deploy
        run: |
          REVISION=$(helm history devops-app -n prod --max 1 -o json 2>/dev/null | jq -r '.[0].revision // "0"')
          echo "revision=${REVISION}" >> $GITHUB_OUTPUT
          echo "Current revision: ${REVISION}"

      - name: Helm upgrade (prod)
        id: helm_deploy
        run: |
          helm upgrade --install devops-app ${{ env.HELM_CHART }} \
            -f ${{ env.HELM_CHART }}/environments/prod/values.yaml \
            --namespace prod \
            --create-namespace \
            --set image.tag=${{ needs.build.outputs.image_tag }} \
            --set env.APP_VERSION=${{ needs.build.outputs.image_tag }} \
            --wait \
            --timeout 8m \
            --atomic

      - name: Notify Slack — Prod success
        if: success()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "🚀 *Prod Deploy Succeeded*",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "🚀 *Prod Deploy Succeeded*\n*Repo:* ${{ github.repository }}\n*Tag:* `${{ needs.build.outputs.image_tag }}`\n*Actor:* ${{ github.actor }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Auto-rollback on failure
        if: failure() && steps.helm_deploy.outcome == 'failure'
        run: |
          echo "Deploy failed — rolling back to revision ${{ steps.pre_deploy.outputs.revision }}"
          helm rollback devops-app ${{ steps.pre_deploy.outputs.revision }} -n prod --wait

      - name: Notify Slack — Prod failure + rollback
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "🔴 *Prod Deploy Failed — Rollback Triggered*",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "🔴 *Prod Deploy Failed — Rollback Triggered*\n*Repo:* ${{ github.repository }}\n*Tag:* `${{ needs.build.outputs.image_tag }}`\n*Rolled back to revision:* `${{ steps.pre_deploy.outputs.revision }}`\n*Run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Logs>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
