apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: devops-app-alerts
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: devops-app
      interval: 30s
      rules:
        - alert: HighErrorRate
          expr: |
            rate(app_requests_total{status=~"5.."}[5m]) /
            rate(app_requests_total[5m]) > 0.05
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "High error rate on {{ $labels.kubernetes_pod_name }}"
            description: "Error rate is {{ $value | humanizePercentage }} — above 5% threshold."

        - alert: HighLatency
          expr: |
            histogram_quantile(0.95, rate(app_request_latency_seconds_bucket[5m])) > 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High P95 latency"
            description: "P95 latency is {{ $value }}s — above 1s threshold."

        - alert: PodCrashLooping
          expr: |
            rate(kube_pod_container_status_restarts_total[15m]) * 60 * 15 > 3
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Pod {{ $labels.pod }} is crash-looping"
            description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} restarted {{ $value }} times in 15 minutes."

        - alert: NodeHighCPU
          expr: |
            100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Node CPU above 85%"
            description: "Node {{ $labels.instance }} CPU usage is {{ $value }}%."

        - alert: NodeHighMemory
          expr: |
            (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Node memory above 85%"
            description: "Node {{ $labels.instance }} memory usage is {{ $value }}%."

        - alert: DeploymentReplicasMismatch
          expr: |
            kube_deployment_spec_replicas != kube_deployment_status_available_replicas
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Deployment {{ $labels.deployment }} replicas mismatch"
            description: "Expected {{ $labels.spec_replicas }} replicas, only {{ $labels.available_replicas }} available."
